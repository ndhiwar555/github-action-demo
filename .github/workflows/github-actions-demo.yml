name: Github Actions Demo
on:
  push:
    branches: [main]

jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
      - name: say hello to users
        run: echo "Hello Users"

      - name: say hello to user
        run: echo "Hello $USER"

  smile:
    runs-on: ubuntu-latest
    steps:
      - name: say smile
        run: echo "smile"

      - name: say cheese
        run: echo "cheese"
        
