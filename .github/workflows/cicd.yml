name: CICD

on:
  workflow_dispatch:

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        run: echo "code checkout from github"
        
  build:
    needs: [code]
    runs-on: ubuntu-latest
    steps:
      - name: build image
        run: echo "build docker image"
        
  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: run testcases
        run: echo "Testing done"
        
  deploy:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: deploy changes
        run: echo "Deploy done"
